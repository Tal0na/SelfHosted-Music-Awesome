<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Self Hosted Music</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
  <style>
    body {
      background: #0d1117;
      padding: 40px;
    }

    .markdown-body {
      max-width: 900px;
      margin: auto;
      background: #161b22;
      padding: 30px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div id="content" class="markdown-body"></div>

  <!-- Biblioteca Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    let currentPath = '';

    function loadPage(page) {
      // salva o diretório atual
      currentPath = page.substring(0, page.lastIndexOf('/') + 1);

      fetch(page)
        .then(res => res.text())
        .then(text => {
          document.getElementById('content').innerHTML = marked.parse(text);
        });
    }

    loadPage('README.md');

    document.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        let href = e.target.getAttribute('href');

        if (href.endsWith('.md')) {
          e.preventDefault()
          let newPath;

          if (href.startsWith('./')) {
            newPath = currentPath + href.replace('./', '');
          } else {
            newPath = href;
          }

          loadPage(newPath);
        }
      }
    });
  </script>

</body>

</html>
