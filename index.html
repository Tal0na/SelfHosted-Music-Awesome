<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Self Hosted Music</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
  <style>
    body {
      background: #0d1117;
      padding: 40px;
    }

    .markdown-body {
      max-width: 900px;
      margin: auto;
      background: #161b22;
      padding: 30px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div id="content" class="markdown-body"></div>

  <!-- Biblioteca Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    fetch('README.md')
      .then(res => res.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      });
  </script>

</body>

</html>
